syntax = "proto3";

package dfs_service;

service DFSService {

    // Add your service calls here

    // 1. REQUIRED (Parts 1 & 2): A method to store files on the server
  rpc Store(stream StoreRequest) {
    returns (StoreReply);
  }
    // 2. REQUIRED (Parts 1 & 2): A method to fetch files from the server
  rpc Fetch(FileRequest){
    returns (stream FileChunk);
  }
    // 3. REQUIRED (Parts 1 & 2): A method to delete files from the server
  rpc Delete(FileRequest){
    returns (DeleteReply);
  }
    // 4. REQUIRED (Parts 1 & 2): A method to list all files on the server
  rpc List(ListRequest){
    returns (ListReply);
  }
    // 5. REQUIRED (Parts 1 & 2): A method to get the status of a file on the server
  rpc Stat(FileRequest){
    returns (FileStatus);
  }
    // 7. Any other methods you deem necessary to complete the tasks of this assignment

}

// Add your message types here

  message FileRequest{
    string fileName = 1;
  }

  message ListRequest{}

  message FileChunk{
    bytes data = 1;
  }

  message FileMetaData{
    string fileName = 1;
    uint64 size = 2;
    int64 mtime = 3;
  }

  message StoreRequest{
    oneof payload{
      FileMetaData meta = 1;
      bytes data = 2;
    }
  }

  message StoreReply{
    FileMetaData status = 1;
  }

  message DeleteReply{
    bool deleted = 1;
  }

  message ListReply{
    repeated FileMetaData files = 1;
  }

  message FileStatus{
    string fileName = 1;
    uint64 size = 2;
    int64 mtime = 3;
  }
